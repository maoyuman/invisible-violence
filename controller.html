<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>Language Remote Controller</title>
    <link rel="stylesheet" href="styles.css?v=6" />
  </head>
  <body class="controller-page">
    <video
      id="bg-video"
      class="controller-bg-video"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      preload="auto"
      aria-hidden="true"
    >
      <!-- MP4 (H.264) plays reliably in Chrome / many desktops; MOV is best-effort + Safari/iPad. -->
      <source src="assets/ipad-background.mp4" type="video/mp4" />
      <source src="assets/ipad-background.mov" type="video/quicktime" />
    </video>
    <main class="controller-ui" aria-label="Remote language controls">
      <div class="controller-button-row">
        <span class="controller-btn-spacer" aria-hidden="true"></span>
        <button id="click-btn" class="control-button controller-btn-side" type="button">
          Attack More
        </button>
        <span class="controller-btn-spacer" aria-hidden="true"></span>
        <button id="long-press-btn" class="control-button controller-btn-side" type="button">
          Attack Less
        </button>
        <span class="controller-btn-spacer" aria-hidden="true"></span>
      </div>
      <p id="status-text" class="controller-status-text">
        Use Attack More or Attack Less to change what appears on the main screen.
      </p>
      <p
        id="relay-hint"
        class="controller-status-text"
        style="display: none; max-width: 92vw; margin-left: auto; margin-right: auto"
      ></p>
    </main>
    <script src="controller.js?v=7"></script>
  </body>
</html>
