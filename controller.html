<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Remote Controller</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="mobile-controls" aria-label="Remote language controls">
      <button id="click-btn" class="control-button" type="button">
        PLEASE CLICK
      </button>
      <button id="long-press-btn" class="control-button" type="button">
        PLEASE LONG PRESS
      </button>
      <p id="status-text" class="status-text">Please click the button to see what changes in the screen.</p>
    </main>
    <script src="controller.js"></script>
  </body>
  </html>
